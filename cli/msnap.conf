# msnap configuration file
# 
# Default precedence (highest to lowest):
# 1. CLI arguments (--output-dir, etc.)
# 2. Config file values (if not empty below)
# 3. XDG environment variables (XDG_PICTURES_DIR, XDG_VIDEOS_DIR)
# 4. Hardcoded defaults in source code
#
# Leave values empty to use defaults from precedence chain

# Screenshot settings
# Default output: $XDG_PICTURES_DIR/Screenshots or ~/Pictures/Screenshots
shot_output_dir=
# Default pattern: %Y-%m-%d_%H-%M-%S_screenshot.png
shot_filename_pattern=
# Show pointer in screenshots (true/false, default: false)
shot_pointer_default=false

# Screencast settings
# Default output: $XDG_VIDEOS_DIR/Screencasts or ~/Videos/Screencasts
cast_output_dir=
# Default pattern: %Y-%m-%d_%H-%M-%S_screencast.mp4
cast_filename_pattern=
